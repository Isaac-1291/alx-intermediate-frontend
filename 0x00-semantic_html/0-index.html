<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Semantic HTML Page</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <article>
        <h1>Welcome to My First Semantic HTML Page</h1>
        <section>
          <p>
            This is a simple HTML page using semantic tags like `<header>`, `<nav>`, `<main>`,
            `<article>`, and `<footer>`. Semantic HTML makes your content more meaningful
            and accessible.
          </p>
        </section>
      </article>
    </main>

    <footer>
      <p>&copy; Copyright 2025</p>
    </footer>
  </body>
</html>
